---
- name: Complete Infrastructure Deployment
  hosts: all
  become: true
  gather_facts: true
  tasks:
  - name: Deploy LAMP stack
    import_role:
      name: webserver
    when: inventory_hostname in groups['webservers']
    tags: lamp

  - name: Deploy NFS server
    import_role:
      name: nfsserver
    when: inventory_hostname in groups['nfsservers']
    tags: nfs

  - name: Deploy WordPress
    import_role:
      name: wordpress
    when: inventory_hostname in groups['wordpress_vms']
    tags: wordpress
