- name: Install EPEL repository (RedHat)
  yum:
    name: epel-release
    state: present
  when: ansible_os_family == 'RedHat'

- name: Fix CentOS 7 repos (EOL vault)
  shell: |
    sed -i 's|^mirrorlist=|#mirrorlist=|g' /etc/yum.repos.d/CentOS-*.repo
    sed -i 's|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*.repo
  when: ansible_distribution == 'CentOS' and ansible_distribution_major_version == '7'

- name: Disable MySQL module on EL8
  command: dnf -y module disable mysql
  when: ansible_os_family == 'RedHat' and ansible_distribution_major_version == '8'
  changed_when: false
  failed_when: false

- name: Add MySQL community repo (RedHat)
  shell: |
    URL="{{ 'https://dev.mysql.com/get/mysql80-community-release-el7-11.noarch.rpm' if ansible_distribution_major_version == '7' else 'https://dev.mysql.com/get/mysql80-community-release-el8-9.noarch.rpm' }}"
    curl -L --fail -o /tmp/mysql-community-release.rpm "$URL"
    rpm -Uvh --replacepkgs /tmp/mysql-community-release.rpm
  when: ansible_os_family == 'RedHat'

- name: Install LAMP packages (Debian/Ubuntu)
  apt:
    name:
    - apache2
    - mysql-server
    - php
    - php-mysql
    - libapache2-mod-php
    - python3-pymysql
    state: present
    update_cache: yes
  when: ansible_os_family == 'Debian'

- name: Install LAMP packages (RedHat/CentOS/Rocky)
  yum:
    name:
    - httpd
    - mysql-community-server
    - php
    - php-mysqlnd
    - php-zip
    - php-xml
    - php-mbstring
    - python3-PyMySQL
    state: present
    disable_gpg_check: yes
  when: ansible_os_family == 'RedHat'

- name: Start and enable Apache (Debian)
  service:
    name: apache2
    state: started
    enabled: yes
  when: ansible_os_family == 'Debian'

- name: Start and enable Apache (RedHat)
  service:
    name: httpd
    state: started
    enabled: yes
  when: ansible_os_family == 'RedHat'

- name: Start and enable MySQL (Debian)
  service:
    name: mysql
    state: started
    enabled: yes
  when: ansible_os_family == 'Debian'

- name: Start and enable MySQL (RedHat)
  service:
    name: mysqld
    state: started
    enabled: yes
  when: ansible_os_family == 'RedHat'

- name: Create document root for acasa.local
  file:
    path: "{{ apache_docroot }}"
    state: directory
    mode: '0755'

- name: Apply SELinux context on docroot (RedHat)
  command: restorecon -Rv "{{ apache_docroot }}"
  when: ansible_os_family == 'RedHat'
  changed_when: false

- name: Deploy vhost config (Debian)
  template:
    src: vhost.conf.j2
    dest: /etc/apache2/sites-available/acasa.local.conf
  when: ansible_os_family == 'Debian'
  notify: Reload Apache

- name: Enable acasa.local site (Debian)
  command: a2ensite acasa.local.conf
  args:
    creates: /etc/apache2/sites-enabled/acasa.local.conf
  when: ansible_os_family == 'Debian'
  notify: Reload Apache

- name: Enable mod_rewrite (Debian)
  command: a2enmod rewrite
  args:
    creates: /etc/apache2/mods-enabled/rewrite.load
  when: ansible_os_family == 'Debian'
  notify: Reload Apache

- name: Deploy vhost config (RedHat)
  template:
    src: vhost.conf.j2
    dest: /etc/httpd/conf.d/acasa.local.conf
  when: ansible_os_family == 'RedHat'
  notify: Reload Apache

- name: Deploy custom PHP index page
  template:
    src: index.php.j2
    dest: "{{ apache_docroot }}/index.php"
