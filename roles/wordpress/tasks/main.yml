---
- name: Install EPEL (RedHat)
  yum:
    name: epel-release
    state: present
  when: ansible_os_family == 'RedHat'

- name: Fix CentOS 7 repos (EOL vault)
  shell: |
    sed -i 's|^mirrorlist=|#mirrorlist=|g' /etc/yum.repos.d/CentOS-*.repo
    sed -i 's|^#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*.repo
  when: ansible_distribution == 'CentOS' and ansible_distribution_major_version == '7'

- name: Disable MySQL module on EL8
  command: dnf -y module disable mysql
  when: ansible_os_family == 'RedHat' and ansible_distribution_major_version == '8'
  changed_when: false
  failed_when: false

- name: Add MySQL community repo (RedHat)
  shell: |
    URL="{{ 'https://dev.mysql.com/get/mysql80-community-release-el7-11.noarch.rpm' if ansible_distribution_major_version == '7' else 'https://dev.mysql.com/get/mysql80-community-release-el8-9.noarch.rpm' }}"
    curl -L --fail -o /tmp/mysql-community-release.rpm "$URL"
    rpm -Uvh --replacepkgs /tmp/mysql-community-release.rpm
  when: ansible_os_family == 'RedHat'

- name: Install WordPress dependencies (Debian/Ubuntu)
  apt:
    name:
    - apache2
    - php
    - php-mysql
    - php-curl
    - php-gd
    - php-xml
    - php-mbstring
    - php-zip
    - libapache2-mod-php
    - mysql-server
    - python3-pymysql
    - unzip
    state: present
    update_cache: yes
  when: ansible_os_family == 'Debian'

- name: Install WordPress dependencies (RedHat/CentOS/Rocky)
  yum:
    name:
    - httpd
    - php
    - php-mysqlnd
    - php-curl
    - php-gd
    - php-xml
    - php-mbstring
    - php-zip
    - mysql-community-server
    - python3-PyMySQL
    - tar
    state: present
    disable_gpg_check: yes
  when: ansible_os_family == 'RedHat'

- name: Start and enable Apache (Debian)
  service:
    name: apache2
    state: started
    enabled: yes
  when: ansible_os_family == 'Debian'

- name: Start and enable Apache (RedHat)
  service:
    name: httpd
    state: started
    enabled: yes
  when: ansible_os_family == 'RedHat'

- name: Start and enable MySQL (Debian)
  service:
    name: mysql
    state: started
    enabled: yes
  when: ansible_os_family == 'Debian'

- name: Start and enable MySQL (RedHat)
  service:
    name: mysqld
    state: started
    enabled: yes
  when: ansible_os_family == 'RedHat'

- name: Create WordPress database (Debian)
  community.mysql.mysql_db:
    name: "{{ wordpress_db_name }}"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  when: ansible_os_family == 'Debian'

- name: Create WordPress database (RedHat)
  community.mysql.mysql_db:
    name: "{{ wordpress_db_name }}"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock
  when: ansible_os_family == 'RedHat'

- name: Create WordPress DB user (Debian)
  community.mysql.mysql_user:
    name: "{{ wordpress_db_user }}"
    password: "{{ wordpress_db_password }}"
    priv: "{{ wordpress_db_name }}.*:ALL"
    host: localhost
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  when: ansible_os_family == 'Debian'

- name: Create WordPress DB user (RedHat)
  community.mysql.mysql_user:
    name: "{{ wordpress_db_user }}"
    password: "{{ wordpress_db_password }}"
    priv: "{{ wordpress_db_name }}.*:ALL"
    host: localhost
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock
  when: ansible_os_family == 'RedHat'

- name: Download WordPress
  get_url:
    url: https://wordpress.org/latest.tar.gz
    dest: /tmp/wordpress.tar.gz

- name: Extract WordPress
  unarchive:
    src: /tmp/wordpress.tar.gz
    dest: /var/www/html/
    remote_src: yes
    creates: /var/www/html/wordpress/wp-settings.php

- name: Deploy wp-config.php
  template:
    src: wp-config.php.j2
    dest: /var/www/html/wordpress/wp-config.php
    owner: "{{ 'www-data' if ansible_os_family == 'Debian' else 'apache' }}"
    group: "{{ 'www-data' if ansible_os_family == 'Debian' else 'apache' }}"
    mode: '0640'

- name: Set ownership for WordPress files (Debian)
  file:
    path: /var/www/html/wordpress
    owner: www-data
    group: www-data
    recurse: yes
  when: ansible_os_family == 'Debian'

- name: Set ownership for WordPress files (RedHat)
  file:
    path: /var/www/html/wordpress
    owner: apache
    group: apache
    recurse: yes
  when: ansible_os_family == 'RedHat'

- name: Deploy WordPress vhost (Debian)
  template:
    src: wp-vhost.conf.j2
    dest: /etc/apache2/sites-available/wordpress.conf
  when: ansible_os_family == 'Debian'
  notify: Reload Apache WP

- name: Enable WordPress site (Debian)
  command: a2ensite wordpress.conf
  args:
    creates: /etc/apache2/sites-enabled/wordpress.conf
  when: ansible_os_family == 'Debian'
  notify: Reload Apache WP

- name: Enable mod_rewrite (Debian)
  command: a2enmod rewrite
  args:
    creates: /etc/apache2/mods-enabled/rewrite.load
  when: ansible_os_family == 'Debian'
  notify: Reload Apache WP

- name: Deploy WordPress vhost (RedHat)
  template:
    src: wp-vhost.conf.j2
    dest: /etc/httpd/conf.d/wordpress.conf
  when: ansible_os_family == 'RedHat'
  notify: Reload Apache WP
